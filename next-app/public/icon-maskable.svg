<!--
  Barakah Hub — maskable app icon (Concept A, safe-zone padded).
  Used for `purpose: maskable`. The crescent sits inside the inner 80%
  safe-zone so platform masks (circle, squircle, rounded square, teardrop)
  don't crop the artwork.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Barakah Hub">
  <defs>
    <mask id="cr">
      <rect width="512" height="512" fill="black"/>
      <circle cx="256" cy="256" r="135" fill="white"/>
      <circle cx="313.5" cy="234.5" r="118" fill="black"/>
    </mask>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0e0e0a"/>
      <stop offset="100%" stop-color="#0a0a08"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#e8c96a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="135" fill="url(#gold)" mask="url(#cr)"/>
</svg>
