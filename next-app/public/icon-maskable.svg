<!--
  Barakah Hub — maskable app icon (Concept A, safe-zone padded).
  Brutalist Islamic palette: off-white silhouette on charcoal.
  Crescent sits inside the inner 80% safe-zone so platform masks
  (circle, squircle, rounded square, teardrop) don't crop the artwork.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Barakah Hub">
  <defs>
    <mask id="cr">
      <rect width="512" height="512" fill="black"/>
      <circle cx="256" cy="256" r="135" fill="white"/>
      <circle cx="313.5" cy="234.5" r="118" fill="black"/>
    </mask>
  </defs>
  <rect width="512" height="512" fill="#14171c"/>
  <circle cx="256" cy="256" r="135" fill="#ebe7dd" mask="url(#cr)"/>
</svg>
