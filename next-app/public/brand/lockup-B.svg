<!--
  Barakah Hub — full lockup, concept B.
  Faceted crescent + Montserrat-style display caps wordmark.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 96" role="img" aria-label="Barakah Hub">
  <defs>
    <mask id="crescent-BL">
      <rect width="460" height="96" fill="black"/>
      <circle cx="48" cy="48" r="32" fill="white"/>
      <circle cx="61.6" cy="43" r="28" fill="black"/>
    </mask>
    <linearGradient id="facet-BL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="currentColor" stop-opacity="1"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <g mask="url(#crescent-BL)">
    <circle cx="48" cy="48" r="32" fill="url(#facet-BL)"/>
    <path d="M 26 38 Q 35 48 26 64" fill="none" stroke="currentColor" stroke-opacity="0.3" stroke-width="0.9" stroke-linecap="round"/>
  </g>
  <text
    x="100" y="58"
    font-family="'Montserrat', Inter, system-ui, sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="6"
    fill="currentColor"
  >BARAKAH</text>
  <text
    x="100" y="80"
    font-family="'Montserrat', Inter, system-ui, sans-serif"
    font-size="11"
    font-weight="500"
    letter-spacing="10"
    fill="currentColor"
    fill-opacity="0.7"
  >· HUB ·</text>
</svg>
