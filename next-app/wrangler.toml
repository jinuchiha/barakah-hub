# Cloudflare Workers config — Barakah Hub
# Phase 3 Next.js app deployed via @opennextjs/cloudflare adapter.
#
# Live URL: https://app.barakah-hub.workers.dev
# (Worker name = `app` below; Cloudflare workers.dev subdomain = `barakah-hub`)
#
# To deploy:
#   pnpm install
#   pnpm build:cf                                         # OpenNext build → .open-next/
#   wrangler login                                        # one-off
#   wrangler secret put DATABASE_URL                      # pooled Neon URL
#   wrangler secret put DATABASE_URL_DIRECT               # direct Neon URL
#   wrangler secret put BETTER_AUTH_SECRET                # `openssl rand -base64 32`
#   wrangler secret put RESEND_API_KEY                    # optional, for password-reset email
#   pnpm deploy:cf

name = "app"
main = ".open-next/worker.js"
compatibility_date = "2026-05-08"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Bind static assets (CSS, JS bundles, images, /public/*) so the Worker
# can serve them without round-tripping through user code.
[assets]
binding = "ASSETS"
directory = ".open-next/assets"
run_worker_first = false

# Build-time / public env vars. These end up in the client bundle, so
# they are NOT secret. Real secrets go via `wrangler secret put`.
[vars]
NEXT_PUBLIC_APP_URL = "https://app.barakah-hub.workers.dev"

# Observability — free tier; ships logs to the Cloudflare dashboard.
[observability]
enabled = true
head_sampling_rate = 1
