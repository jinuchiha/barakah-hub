# Cloudflare Workers config — Barakah Hub
# Phase 3 Next.js app deployed via @opennextjs/cloudflare adapter.
#
# Live URL: https://barakahhub.bakerabi91.workers.dev
# (Worker subdomain = `name` below; account = bakerabi91)
#
# To deploy:
#   pnpm install
#   pnpm build:cf            # OpenNext build → .open-next/
#   wrangler login           # one-off
#   wrangler secret put DATABASE_URL                # paste Postgres URL
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY   # paste service role key
#   pnpm deploy:cf

name = "barakahhub"
main = ".open-next/worker.js"
compatibility_date = "2026-05-08"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Bind static assets (CSS, JS bundles, images, /public/*) so the Worker
# can serve them without round-tripping through user code.
[assets]
binding = "ASSETS"
directory = ".open-next/assets"
run_worker_first = false

# Build-time / public env vars. These end up in the client bundle, so
# they are NOT secret. Put real Supabase URL + anon key here.
# (Use `wrangler secret put` for DATABASE_URL and the service-role key.)
[vars]
NEXT_PUBLIC_SUPABASE_URL = "https://placeholder.supabase.co"
NEXT_PUBLIC_SUPABASE_ANON_KEY = "placeholder-anon-key"

# Observability — free tier; ships logs to the Cloudflare dashboard.
[observability]
enabled = true
head_sampling_rate = 1
