# Cloudflare Pages config — project: barakah-hub
# (If migrating an existing Pages project named "balochsath", create a new
#  project under "barakah-hub" or rename the existing one in the CF dashboard.)

name = "barakah-hub"
compatibility_date = "2026-05-07"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# IMPORTANT: env vars are managed in the Cloudflare Pages dashboard, not here.
# Go to: Pages → barakah-hub → Settings → Environment variables
# and add (BOTH Production AND Preview):
#   NEXT_PUBLIC_SUPABASE_URL       = https://<your-project>.supabase.co
#   NEXT_PUBLIC_SUPABASE_ANON_KEY  = <anon key from Supabase API settings>
#   SUPABASE_SERVICE_ROLE_KEY      = <service role key — keep server-only>
#   DATABASE_URL                   = postgresql://postgres.<your-project>:<PASSWORD>@aws-0-<REGION>.pooler.supabase.com:6543/postgres

# Pages doesn't use [vars] from this file — set them in the dashboard for both Preview + Production envs.
