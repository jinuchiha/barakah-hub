name: Neon PR branch

# Creates a Neon database branch named `pr-<number>` for every pull
# request. The CI job in ci.yml reads its DATABASE_URL from the output
# of this workflow's branch-creation step (passed via repo dispatch
# isn't needed — neondatabase/create-branch-action exposes outputs).

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

concurrency:
  group: neon-branch-${{ github.event.number }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: next-app

jobs:
  create:
    name: Create Neon branch + apply migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          parent: main
          branch_name: pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with: { version: 9, run_install: false }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: next-app/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL_DIRECT: ${{ steps.neon.outputs.db_url }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.neon.outputs.db_url_pooled }}';
            const tag = `<!-- neon-branch-pr-${{ github.event.number }} -->`;
            const body = `${tag}\n🌿 Neon branch \`pr-${{ github.event.number }}\` is ready. Migrations applied.\n\nConnection string is set on this PR's CI runs as \`DATABASE_URL\`.`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body?.includes(tag));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
